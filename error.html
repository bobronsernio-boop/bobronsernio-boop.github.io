<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XENA - Error</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:16px;padding:20px}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:32px;max-width:500px;width:100%;text-align:center}
.code{font-size:48px;font-weight:800;color:#ef4444;margin-bottom:8px;font-family:monospace}
.title{font-size:18px;color:#fff;margin-bottom:8px}
.msg{font-size:13px;color:#888;line-height:1.5}
.back{margin-top:20px;display:inline-block;padding:8px 20px;background:#6366f1;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600}
.back:hover{background:#4f46e5}
</style>
</head>
<body>
<div class="card">
  <div class="code" id="error-code">XNA-502</div>
  <div class="title" id="error-title">Proxy Error</div>
  <div class="msg" id="error-msg">Something went wrong.</div>
  <a class="back" href="/">Go Home</a>
</div>
<script>
try {
  var p = new URLSearchParams(window.location.search);
  var rc = p.get('rc');
  if (rc) {
    var d = JSON.parse(atob(rc));
    document.getElementById('error-code').textContent = d.code || 'XNA-502';
    document.getElementById('error-title').textContent = d.title || 'Error';
    document.getElementById('error-msg').textContent = d.message || 'Unknown error';
  }
} catch(e) {}
</script>
</body>
</html>
