<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Khan Academy</title>
<!-- Your existing styles, including splash screen and look -->
<!-- ... (keep your original CSS and layout) ... -->
</head>
<body>
<!-- Splash screen to mimic tutoring site -->
<div id="splash" style="position:fixed; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
  <img src="https://cdn.khanacademy.org/images/khan-logo.png" alt="Khan Academy" style="width:150px;"/>
  <h1 style="margin-top:16px; color:#333;">Khan Academy</h1>
  <p style="color:#555;">Loading...</p>
</div>

<!-- Your main content remains unchanged -->
<!-- ... (header, iframe, footer, modals, scripts) ... -->

<script src="/engine.js"></script>
<script>
(function() {
  'use strict';

  let scramjetController, scramjetFrame;

  async function loadScramjet() {
    if (typeof ScramjetController !== 'undefined') return;
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = '/scram/scramjet.bundle.js';
      s.onload = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  async function init() {
    await loadScramjet();
    const { ScramjetController } = window;
    scramjetController = new ScramjetController({
      prefix: '/scram/',
      files: {
        wasm: '/scram/scramjet.wasm.wasm',
        all: '/scram/scramjet.all.js',
        sync: '/scram/scramjet.sync.js'
      },
      flags: {
        strictRewrites: true,
        captureErrors: true
      }
    });
    await scramjetController.init();
    const iframe = document.getElementById('rframe');
    scramjetFrame = scramjetController.createFrame(iframe);
    document.getElementById('splash').style.display='none';
  }

  window.onload = init;

  window.XENA = { 
    navigate: (url) => {
      if (!scramjetController || !scramjetFrame) {
        document.getElementById('rframe').src = '/scram/' + btoa(url);
      } else {
        try {
          scramjetFrame.navigate(url);
        } catch(e) {
          document.getElementById('rframe').src = '/scram/' + btoa(url);
        }
      }
    }
  };
})();
</script>
</body>
</html>
