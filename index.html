<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google Classroom</title>
<link rel="shortcut icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<!-- [same head styles as before - keep all your existing CSS/head content] -->
</head>
<body>
<!-- [same HTML structure as before - keep all your existing DOM elements] -->

<!-- Replace ONLY the application <script> section at the bottom -->
<script src="/engine.js"></script>
<script>
// ============================================================
// XENA APP LOGIC
// ============================================================
function $(id){return document.getElementById(id)}

// Tabs state
var tabs=[], actTab=null, tc=0;
var hist=JSON.parse(localStorage.getItem('xnHist')||'[]');

// Search query analysis
function searchQuery(q) {
  var t = q.trim();
  if (!t) return '';
  if (/^https?:\/\//i.test(t)) return t;
  if (/^[a-z0-9]([a-z0-9.-]*[a-z0-9])?\.[a-z]{2,}(\/.*)?$/i.test(t)) return 'https://' + t;
  var mode = localStorage.getItem('xnDDGMode') || 'api';
  if (mode === 'google') return 'https://www.google.com/search?q=' + encodeURIComponent(t) + '&udm=2';
  return '__api__' + t;
}

// Main navigate
function navigate(input) {
  var d = searchQuery(input);
  if (!d) return;
  
  if (d.startsWith('__api__')) {
    searchAPI(d.replace('__api__', ''));
    return;
  }
  
  // Save to history
  hist = hist.filter(function(h) { return h !== d; });
  hist.unshift(d);
  if (hist.length > 50) hist = hist.slice(0, 50);
  localStorage.setItem('xnHist', JSON.stringify(hist));
  
  // Show iframe
  $('homepage').style.display = 'none';
  hideErr();
  $('rframe').style.display = 'block';
  
  // Update tab
  var t = tabs.find(function(x) { return x.id === actTab; });
  if (t) {
    t.url = d;
    try { t.title = new URL(d).hostname.replace('www.', ''); } catch(e) { t.title = d; }
    t.favicon = 'https://www.google.com/s2/favicons?domain=' + (t.url.startsWith('http') ? new URL(t.url).hostname : 'google.com') + '&sz=16';
  }
  renderTabs();
  $('urlbar').value = d;
  
  // Navigate via Scramjet
  if (window.XENA && window.XENA.navigate) window.XENA.navigate(d);
  else $('rframe').src = d;
}

// API search (DDG - no captcha)
function searchAPI(query) {
  fetch('/api/search?q=' + encodeURIComponent(query))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var html = buildSearchHTML(query, data);
      var blob = new Blob([html], { type: 'text/html' });
      $('rframe').src = URL.createObjectURL(blob);
      $('homepage').style.display = 'none';
      $('rframe').style.display = 'block';
      $('urlbar').value = 'search: ' + query;
      $('searchfield').value = '';
      
      var t = tabs.find(function(x) { return x.id === actTab; });
      if (t) { t.url = 'search:' + query; t.title = 'Search: ' + query; }
      renderTabs();
    })
    .catch(function() { navigate('https://www.google.com/search?q=' + encodeURIComponent(query)); });
}

function buildSearchHTML(query, data) {
  var items = '';
  if (data.abstract && data.heading) {
    items += '<div class="abs"><div class="abst">' + escH(data.heading) + '</div><p>' + escH(data.abstract) + '</p></div>';
  }
  if (data.results && data.results.length) {
    for (var r of data.results) {
      items += '<div class="r"><a href="#" onclick="parent.postMessage({type:\'xn-nav\',url:\'' + r.url.replace(/'/g,"\\'") + '\'},\'*\')">' + escH(r.title) + '</a><div class="u">' + r.url + '</div><div class="s">' + escH(r.snippet) + '</div></div>';
    }
  } else {
    items += '<div class="no">No results</div>';
  }
  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + escH(query) + ' - XENA</title><style>body{background:#030303;color:#d4d4d8;font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px}h1{color:white;font-size:20px;border-bottom:1px solid #181818;padding-bottom:12px;margin-bottom:20px}.r{border:1px solid #181818;border-radius:10px;padding:14px;margin-bottom:10px;background:#0a0a0a}.r a{color:#5b9aff;text-decoration:none;font-size:14px;display:block;margin-bottom:4px}.r a:hover{text-decoration:underline}.u{color:#22c55e;font-size:11px;margin-bottom:6px}.s{color:#a1a1aa;font-size:12px;line-height:1.6}.abs{border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:20px;background:#0d0d0d}.abst{color:white;font-size:14px;font-weight:600;margin-bottom:8px}.no{color:#52525b;text-align:center;padding:40px}.f{text-align:center;padding:20px;color:#52525b;font-size:10px}</style></head><body><h1>&#128269; ' + escH(query) + '</h1>' + items + '<div class="f">XENA Search &mdash; DuckDuckGo</div></body></html>';
}

function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Message listener from search iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'xn-nav') navigate(e.data.url);
});

// Event handlers
$('urlbar').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); goURL(); } });
$('searchfield').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); goSearch(); } });

function goSearch() {
  var v = $('searchfield').value.trim();
  if (v) {
    if ((localStorage.getItem('xnDDGMode') || 'api') === 'api') searchAPI(v);
    else navigate(v);
  }
}
function goURL() { var v = $('urlbar').value.trim(); if (v) navigate(v); }
function goHome() {
  var t = tabs.find(function(x) { return x.id === actTab; });
  if (t) { t.url = ''; t.title = 'Homepage'; t.favicon = null; }
  $('rframe').style.display = 'none'; $('rframe').src = 'about:blank';
  hideErr(); $('homepage').style.display = 'flex'; $('urlbar').value = ''; $('searchfield').value = '';
  renderTabs();
}

function nav(d) {
  try {
    var f = $('rframe');
    if (!f.contentWindow) return;
    if (d === 'back') f.contentWindow.history.back();
    else if (d === 'forward') f.contentWindow.history.forward();
    else if (d === 'reload') f.contentWindow.location.reload();
  } catch(e) {}
}

// TABS
function newTab(url) {
  var id = 't-' + (++tc);
  var tab = { id: id, title: 'Homepage', url: url || '', favicon: null };
  tabs.push(tab); actTab = id; renderTabs();
  if (url) navigate(url); else switchTab(id);
  return id;
}

function renderTabs() {
  var con = $('tabbar'); con.innerHTML = '';
  for (var i = 0; i < tabs.length; i++) {
    var t = tabs[i], a = t.id === actTab;
    var di = document.createElement('div');
    di.className = 'group flex items-center gap-1 px-2.5 h-7 rounded-t-lg border-t border-x border-zinc-800 cursor-pointer transition min-w-[110px] max-w-[160px] hover:border-zinc-700';
    di.style.background = a ? '#050505' : '#000'; di.style.color = a ? 'white' : '#71717a';
    var ic = document.createElement('img');
    ic.className = 'tab-icon'; ic.src = t.favicon || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="%23333"/></svg>';
    ic.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="%23555"/></svg>'; };
    var sp = document.createElement('span');
    sp.className = 'text-[10px] font-mono truncate flex-1'; sp.textContent = t.title;
    var cl = document.createElement('button');
    cl.className = 'text-zinc-700 hover:text-zinc-400 text-[9px] ml-0.5 leading-none px-0.5'; cl.textContent = 'x';
    (function(tid) { cl.onclick = function(e) { e.stopPropagation(); closeTab(tid); }; })(t.id);
    if (tabs.length === 1) cl.style.display = 'none';
    (function(tid) { di.onclick = function() { switchTab(tid); }; })(t.id);
    di.appendChild(ic); di.appendChild(sp); di.appendChild(cl); con.appendChild(di);
  }
  var nt = document.createElement('button');
  nt.className = 'flex items-center justify-center w-6 h-6 rounded border border-zinc-800 hover:bg-zinc-900 text-zinc-500 hover:text-white transition text-sm font-mono mb-0.5';
  nt.textContent = '+'; nt.title = 'New Tab'; nt.onclick = function() { addTab(); };
  con.appendChild(nt);
}

function addTab() { newTab(); }
function switchTab(id) {
  actTab = id; var t = tabs.find(function(x) { return x.id === id; }); if (!t) return;
  renderTabs(); hideErr();
  if (t.url && t.url !== 'about:blank') {
    $('homepage').style.display = 'none'; $('rframe').style.display = 'block';
    if (t._cachedSrc) $('rframe').src = t._cachedSrc;
    $('urlbar').value = t.url;
  } else {
    $('homepage').style.display = 'flex'; $('rframe').style.display = 'none'; $('rframe').src = 'about:blank'; $('urlbar').value = '';
  }
  $('searchfield').value = '';
}
function closeTab(id) {
  if (tabs.length <= 1) {
    var t = tabs[0]; t.url = ''; t.title = 'Homepage'; t.favicon = null;
    renderTabs(); switchTab(t.id); return;
  }
  var idx = tabs.findIndex(function(x) { return x.id === id; });
  tabs = tabs.filter(function(x) { return x.id !== id; });
  if (actTab === id) actTab = tabs[Math.min(idx, tabs.length - 1)].id;
  renderTabs(); switchTab(actTab);
}

function showErr(c, t, m) { $('errcode').textContent = c; $('errtitle').textContent = t; $('errmsg').textContent = m; $('errpage').style.display = 'flex'; }
function hideErr() { $('errpage').style.display = 'none'; }

// SETTINGS
function openSettings() {
  $('inp-favicon').value = localStorage.getItem('xnFavicon') || 'https://ssl.gstatic.com/classroom/favicon.png';
  $('inp-title').value = localStorage.getItem('xnTitle') || 'Google Classroom';
  $('inp-panickey').value = localStorage.getItem('xnPanicKey') || 'Escape';
  $('inp-panicurl').value = localStorage.getItem('xnPanicURL') || 'https://classroom.google.com';
  $('inp-ddgmode').value = localStorage.getItem('xnDDGMode') || 'api';
  $('setmodal').classList.add('open');
}
function closeModal(id) { $(id).classList.remove('open'); }
function saveSettings() {
  localStorage.setItem('xnFavicon', $('inp-favicon').value);
  localStorage.setItem('xnTitle', $('inp-title').value);
  localStorage.setItem('xnPanicKey', $('inp-panickey').value);
  localStorage.setItem('xnPanicURL', $('inp-panicurl').value);
  localStorage.setItem('xnDDGMode', $('inp-ddgmode').value);
  document.title = $('inp-title').value;
  var link = document.querySelector('link[rel="shortcut icon"]') || document.querySelector('link[rel="icon"]');
  if (link) link.href = $('inp-favicon').value;
  closeModal('setmodal');
}
function switchPane(id, btn) {
  document.querySelectorAll('.stab-content').forEach(function(e) { e.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(e) { e.classList.remove('active'); });
  $(id).classList.add('active'); if (btn) btn.classList.add('active');
}
function clearHist() { localStorage.setItem('xnHist', '[]'); hist = []; }
function resetSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) { for (var r of regs) r.unregister(); });
  }
  caches.keys().then(function(names) { for (var n of names) caches.delete(n); });
}
function resetXena() { localStorage.clear(); resetSW(); location.reload(); }

// CLOCK
function updateClock() { $('footerclock').textContent = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'}); }
setInterval(updateClock, 10000); updateClock();

// HEALTH
function checkHealth() {
  fetch('/health/quick').then(function(r) { return r.json(); }).then(function(d) {
    var dot = $('statusdot'); dot.style.background = d.color; dot.style.boxShadow = '0 0 4px ' + d.color;
    $('footerstatus').textContent = d.label;
  }).catch(function() {
    $('statusdot').style.background = '#ef4444'; $('statusdot').style.boxShadow = '0 0 4px #ef4444';
    $('footerstatus').textContent = 'offline';
  });
}
checkHealth(); setInterval(checkHealth, 30000);

// PANIC
document.addEventListener('keydown', function(e) {
  var key = localStorage.getItem('xnPanicKey') || 'Escape';
  if (e.key === key || e.code === key) window.location.href = localStorage.getItem('xnPanicURL') || 'https://classroom.google.com';
});

// Init cloak + first tab
document.title = localStorage.getItem('xnTitle') || 'Google Classroom';
var fl = document.querySelector('link[rel="shortcut icon"]');
if (fl) fl.href = localStorage.getItem('xnFavicon') || 'https://ssl.gstatic.com/classroom/favicon.png';
newTab();
</script>
</body>
</html>
